<div class="dashboard-container">
    <aside class="sidebar">
        <div class="logo">
            <span class="gold">TURUTA</span>APP
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item active">
                <i class="icon">📊</i> <span>Panel Central</span>
            </div>
            <div class="nav-item">
                <i class="icon">🏢</i> <span>Concesionarias</span>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-info">
                <h1>Gestión de Concesionarias</h1>
            </div>
            <div class="user-profile">
                <span>Admin Laguna</span>
                <div class="avatar"></div>
            </div>
        </header>

        <div class="dashboard-grid">
            <section class="map-section">
                <div class="section-header">
                    <h3>Mapa de conseciones</h3>
                </div>
                <div class="map-container map-placeholder" id="map-container" leaflet [leafletOptions]="options" (leafletMapReady)="onMapReady($event)">
                </div>

            </section>

            <section class="dealerships-section">
                <h3>Concesionarias Registradas</h3>
                <div class="cards-grid">

                    <div class="dealership-card">
                        <div class="card-header">
                            <span class="dealer-name">Unión de Taxis Torreón</span>
                            <i class="status-icon active"></i>
                        </div>
                        <div class="card-body">
                            <div class="stat"><span>Unidades:</span> <strong>45</strong></div>
                        </div>
                        <button class="btn-view">Ver Detalles</button>
                    </div>

                    <div class="dealership-card">
                        <div class="card-header">
                            <span class="dealer-name">Radio Taxi Laguna</span>
                            <i class="status-icon active"></i>
                        </div>
                        <div class="card-body">
                            <div class="stat"><span>Unidades:</span> <strong>28</strong></div>
                        </div>
                        <button class="btn-view">Ver Detalles</button>
                    </div>

                </div>
            </section>
        </div>
    </main>
</div>
