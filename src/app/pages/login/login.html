<ngx-sonner-toaster position="top-center" richColors />
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <span class="gold">TURUTA</span>APP
            </div>
            <p>Gestión de Transporte e Infraestructura</p>
        </div>

        <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <div class="input-container">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="admin@hinojosa.com" formControlName="email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-container">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="••••••••" required formControlName="password">
                </div>
            </div>

            <button type="submit" class="btn-login">
                INICIAR SESIÓN
            </button>
        </form>

        <footer class="login-footer">
            <p>Desarrollado por <span class="gold">Hinojosa Industries</span></p>
        </footer>
    </div>
</div>
